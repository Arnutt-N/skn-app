name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        shell: bash
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: skn_app_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d skn_app_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:password@127.0.0.1:5432/skn_app_db
      REDIS_URL: redis://127.0.0.1:6379/0
      SECRET_KEY: ci-secret-key
      ENCRYPTION_KEY: zsi41Kqura0QA7xUGAtHnwoAnPP3IAddcu-cb2mfGCA=
      ENVIRONMENT: development
      LINE_CHANNEL_ACCESS_TOKEN: ci-access-token
      LINE_CHANNEL_SECRET: ci-channel-secret
      LINE_LOGIN_CHANNEL_ID: "2000000000"
      SERVER_BASE_URL: http://localhost:8000
      ADMIN_URL: http://localhost:3000
      BACKEND_CORS_ORIGINS: '["http://localhost:3000"]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run backend tests
        run: python -m pytest -q

  frontend:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_DEV_MODE: "false"
      NEXT_PUBLIC_LIFF_ID: ci-liff-id
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend build
        run: npm run build
