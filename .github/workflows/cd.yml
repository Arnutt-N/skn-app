name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub Environment to deploy"
        required: true
        default: production
        type: choice
        options:
          - production
          - staging
      target:
        description: "Select which production deployment to trigger"
        required: true
        default: all
        type: choice
        options:
          - all
          - frontend
          - backend
      backend_skip_build:
        description: "Redeploy the last successful backend build instead of rebuilding"
        required: true
        default: false
        type: boolean

permissions:
  actions: read
  contents: read

concurrency:
  group: cd-${{ github.workflow }}-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

jobs:
  resolve-scope:
    name: Resolve Deployment Scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      github.event_name == 'workflow_dispatch' || (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    outputs:
      deploy_frontend: ${{ steps.scope.outputs.deploy_frontend }}
      deploy_backend: ${{ steps.scope.outputs.deploy_backend }}
      deploy_environment: ${{ steps.scope.outputs.deploy_environment }}
      backend_skip_build: ${{ steps.scope.outputs.backend_skip_build }}
      source_sha: ${{ steps.scope.outputs.source_sha }}
    steps:
      - name: Download deployment scope artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: cd-scope
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: .cd

      - name: Resolve scope
        id: scope
        shell: bash
        env:
          DEPLOY_ENVIRONMENT_INPUT: ${{ inputs.environment }}
          TARGET: ${{ inputs.target }}
          BACKEND_SKIP_BUILD_INPUT: ${{ inputs.backend_skip_build }}
          SOURCE_SHA_INPUT: ${{ github.event.workflow_run.head_sha || github.sha }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            deploy_environment="${DEPLOY_ENVIRONMENT_INPUT}"
            case "${TARGET}" in
              all)
                deploy_frontend=true
                deploy_backend=true
                ;;
              frontend)
                deploy_frontend=true
                deploy_backend=false
                ;;
              backend)
                deploy_frontend=false
                deploy_backend=true
                ;;
              *)
                echo "::error::Unsupported target: ${TARGET}"
                exit 1
                ;;
            esac
            backend_skip_build="${BACKEND_SKIP_BUILD_INPUT}"
          else
            if [ ! -f ".cd/scope.env" ]; then
              echo "::error::Missing cd-scope artifact from CI run ${WORKFLOW_RUN_ID:-unknown}."
              exit 1
            fi

            # shellcheck disable=SC1091
            source .cd/scope.env
            deploy_frontend="${DEPLOY_FRONTEND}"
            deploy_backend="${DEPLOY_BACKEND}"
            deploy_environment=production
            backend_skip_build=false
          fi

          echo "deploy_frontend=${deploy_frontend}" >> "$GITHUB_OUTPUT"
          echo "deploy_backend=${deploy_backend}" >> "$GITHUB_OUTPUT"
          echo "deploy_environment=${deploy_environment}" >> "$GITHUB_OUTPUT"
          echo "backend_skip_build=${backend_skip_build}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${SOURCE_SHA_INPUT}" >> "$GITHUB_OUTPUT"

      - name: Append scope summary
        shell: bash
        run: |
          {
            echo "## Deployment scope"
            echo
            echo "- Frontend: ${{ steps.scope.outputs.deploy_frontend }}"
            echo "- Backend: ${{ steps.scope.outputs.deploy_backend }}"
            echo "- Environment: ${{ steps.scope.outputs.deploy_environment }}"
            echo "- Backend skip build: ${{ steps.scope.outputs.backend_skip_build }}"
            echo "- Source SHA: ${{ steps.scope.outputs.source_sha }}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: resolve-scope
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: needs.resolve-scope.outputs.deploy_frontend == 'true'
    environment: ${{ needs.resolve-scope.outputs.deploy_environment }}
    outputs:
      deploy_configured: ${{ steps.config.outputs.deploy_configured }}
    steps:
      - name: Check frontend deploy config
        id: config
        shell: bash
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "deploy_configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Vercel deploy hook
        if: steps.config.outputs.deploy_configured == 'true'
        shell: bash
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          http_code=$(curl -sS -o response.json -w "%{http_code}" -X POST "$VERCEL_DEPLOY_HOOK_URL")
          cat response.json

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Vercel deploy hook failed with HTTP $http_code"
            exit 1
          fi

      - name: Warn when frontend deploy is skipped
        if: steps.config.outputs.deploy_configured != 'true'
        shell: bash
        run: echo "::warning::VERCEL_DEPLOY_HOOK_URL is not configured. Skipping frontend deployment."

      - name: Append job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Frontend deployment"
            echo
            echo "- Target: Vercel production"
            echo "- Environment: ${{ needs.resolve-scope.outputs.deploy_environment }}"
            echo "- Trigger: ${GITHUB_EVENT_NAME}"
            echo "- Source SHA: ${{ needs.resolve-scope.outputs.source_sha }}"
          } >> "$GITHUB_STEP_SUMMARY"

  migrate-backend:
    name: Run Production DB Migrations
    needs: resolve-scope
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: needs.resolve-scope.outputs.deploy_backend == 'true'
    environment: ${{ needs.resolve-scope.outputs.deploy_environment }}
    defaults:
      run:
        shell: bash
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-scope.outputs.source_sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write remote backend env file
        env:
          BACKEND_REMOTE_ENV_FILE: ${{ secrets.BACKEND_REMOTE_ENV_FILE }}
        run: |
          if [ -z "$BACKEND_REMOTE_ENV_FILE" ]; then
            echo "::error::BACKEND_REMOTE_ENV_FILE is not configured."
            exit 1
          fi
          printf '%s' "$BACKEND_REMOTE_ENV_FILE" > .env

      - name: Show remote DB target
        run: python scripts/db_target.py show --target remote

      - name: Run Alembic upgrade on production DB
        run: python scripts/db_target.py alembic --target remote upgrade head

      - name: Append migration summary
        if: always()
        shell: bash
        working-directory: .
        run: |
          {
            echo "## Production DB migration"
            echo
            echo "- Environment: ${{ needs.resolve-scope.outputs.deploy_environment }}"
            echo "- Trigger: ${GITHUB_EVENT_NAME}"
            echo "- Source SHA: ${{ needs.resolve-scope.outputs.source_sha }}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-backend:
    name: Deploy Backend (Koyeb)
    needs:
      - resolve-scope
      - migrate-backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: needs.resolve-scope.outputs.deploy_backend == 'true'
    environment: ${{ needs.resolve-scope.outputs.deploy_environment }}
    outputs:
      deploy_configured: ${{ steps.config.outputs.deploy_configured }}
    steps:
      - name: Check backend deploy config
        id: config
        shell: bash
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
          KOYEB_APP_NAME: ${{ vars.KOYEB_APP_NAME }}
          KOYEB_SERVICE_NAME: ${{ vars.KOYEB_SERVICE_NAME }}
        run: |
          if [ -z "$KOYEB_TOKEN" ] || [ -z "$KOYEB_APP_NAME" ] || [ -z "$KOYEB_SERVICE_NAME" ]; then
            echo "deploy_configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Koyeb CLI
        if: steps.config.outputs.deploy_configured == 'true'
        shell: bash
        run: |
          curl -fsSL https://raw.githubusercontent.com/koyeb/koyeb-cli/master/install.sh | sh
          echo "$HOME/.koyeb/bin" >> "$GITHUB_PATH"

      - name: Redeploy Koyeb service
        if: steps.config.outputs.deploy_configured == 'true'
        shell: bash
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
          KOYEB_APP_NAME: ${{ vars.KOYEB_APP_NAME }}
          KOYEB_SERVICE_NAME: ${{ vars.KOYEB_SERVICE_NAME }}
          KOYEB_ORGANIZATION_ID: ${{ vars.KOYEB_ORGANIZATION_ID }}
          BACKEND_SKIP_BUILD: ${{ needs.resolve-scope.outputs.backend_skip_build }}
        run: |
          args=(
            services redeploy "$KOYEB_SERVICE_NAME"
            --app "$KOYEB_APP_NAME"
            --token "$KOYEB_TOKEN"
            --wait
            --wait-timeout 15m
            --use-cache
            --force-ascii
          )

          if [ -n "$KOYEB_ORGANIZATION_ID" ]; then
            args+=(--organization "$KOYEB_ORGANIZATION_ID")
          fi

          if [ "$BACKEND_SKIP_BUILD" = "true" ]; then
            args+=(--skip-build)
          fi

          koyeb "${args[@]}"

      - name: Warn when backend deploy is skipped
        if: steps.config.outputs.deploy_configured != 'true'
        shell: bash
        run: echo "::warning::KOYEB_TOKEN, KOYEB_APP_NAME, or KOYEB_SERVICE_NAME is not configured. Skipping backend deployment."

      - name: Append job summary
        if: always()
        shell: bash
        env:
          BACKEND_SKIP_BUILD: ${{ needs.resolve-scope.outputs.backend_skip_build }}
        run: |
          {
            echo "## Backend deployment"
            echo
            echo "- Target: Koyeb production service"
            echo "- Environment: ${{ needs.resolve-scope.outputs.deploy_environment }}"
            echo "- Trigger: ${GITHUB_EVENT_NAME}"
            echo "- Skip build: ${BACKEND_SKIP_BUILD}"
            echo "- Source SHA: ${{ needs.resolve-scope.outputs.source_sha }}"
          } >> "$GITHUB_STEP_SUMMARY"

  smoke-frontend:
    name: Smoke Check Frontend
    needs:
      - resolve-scope
      - deploy-frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: needs.resolve-scope.outputs.deploy_frontend == 'true' && needs.deploy-frontend.outputs.deploy_configured == 'true'
    environment: ${{ needs.resolve-scope.outputs.deploy_environment }}
    steps:
      - name: Verify frontend URL
        shell: bash
        env:
          FRONTEND_HEALTHCHECK_URL: ${{ vars.FRONTEND_HEALTHCHECK_URL }}
        run: |
          if [ -z "$FRONTEND_HEALTHCHECK_URL" ]; then
            echo "::warning::FRONTEND_HEALTHCHECK_URL is not configured. Skipping frontend smoke check."
            exit 0
          fi

          for attempt in $(seq 1 20); do
            if curl -fsS --max-time 15 "$FRONTEND_HEALTHCHECK_URL" >/tmp/frontend-smoke.out; then
              echo "Frontend smoke check passed on attempt $attempt"
              exit 0
            fi
            echo "Frontend not ready yet (attempt $attempt/20). Waiting 15s..."
            sleep 15
          done

          echo "::error::Frontend smoke check failed for $FRONTEND_HEALTHCHECK_URL"
          exit 1

      - name: Append smoke summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Frontend smoke check"
            echo
            echo "- Environment: ${{ needs.resolve-scope.outputs.deploy_environment }}"
            echo "- URL: ${{ vars.FRONTEND_HEALTHCHECK_URL || 'not-configured' }}"
          } >> "$GITHUB_STEP_SUMMARY"

  smoke-backend:
    name: Smoke Check Backend
    needs:
      - resolve-scope
      - deploy-backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: needs.resolve-scope.outputs.deploy_backend == 'true' && needs.deploy-backend.outputs.deploy_configured == 'true'
    environment: ${{ needs.resolve-scope.outputs.deploy_environment }}
    steps:
      - name: Verify backend health endpoint
        shell: bash
        env:
          BACKEND_HEALTHCHECK_URL: ${{ vars.BACKEND_HEALTHCHECK_URL }}
        run: |
          if [ -z "$BACKEND_HEALTHCHECK_URL" ]; then
            echo "::warning::BACKEND_HEALTHCHECK_URL is not configured. Skipping backend smoke check."
            exit 0
          fi

          for attempt in $(seq 1 12); do
            if curl -fsS --max-time 15 "$BACKEND_HEALTHCHECK_URL" >/tmp/backend-smoke.out; then
              echo "Backend smoke check passed on attempt $attempt"
              exit 0
            fi
            echo "Backend not ready yet (attempt $attempt/12). Waiting 10s..."
            sleep 10
          done

          echo "::error::Backend smoke check failed for $BACKEND_HEALTHCHECK_URL"
          exit 1

      - name: Append smoke summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Backend smoke check"
            echo
            echo "- Environment: ${{ needs.resolve-scope.outputs.deploy_environment }}"
            echo "- URL: ${{ vars.BACKEND_HEALTHCHECK_URL || 'not-configured' }}"
          } >> "$GITHUB_STEP_SUMMARY"
